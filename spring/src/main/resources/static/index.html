<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test WebSocket Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h1>WebSocket Chat Test</h1>

<input type="text" id="username" placeholder="Votre pseudo" />
<button onclick="connect()">Connect</button>

<div>
    <input type="text" id="receiver" placeholder="Destinataire (vide = public)" />
    <input type="text" id="message" placeholder="Votre message" />
    <button onclick="sendMessage()">Send Message</button>
</div>

<button onclick="newUser()">Se joindre</button>

<h3>Messages :</h3>
<div id="messages" style="border:1px solid #ccc; padding:10px; height:300px; overflow:auto;"></div>

<script>
    let stompClient = null;

    function connect() {
        const username = document.getElementById('username').value;
        if (!username) {
            alert('Saisis un pseudo !');
            return;
        }

        const socket = new SockJS('http://localhost:8080/ws'); // endpoint WebSocket
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            addMessage('Connected: ' + frame);

            // s'abonner au topic public
            stompClient.subscribe('/topic/public', function (msg) {
                showMessage(JSON.parse(msg.body));
            });

            // s'abonner à ses messages privés si nécessaire
            stompClient.subscribe('/user/queue/messages', function (msg) {
                showMessage(JSON.parse(msg.body));
            });
        });
    }

    function sendMessage() {
        const msgInput = document.getElementById('message').value;
        const receiver = document.getElementById('receiver').value || null;
        const sender = document.getElementById('username').value;

        if (!msgInput) return;

        const chatMessage = {
            sender: sender,
            receiver: receiver,
            message: msgInput,
            type: 'CHAT'
        };

        stompClient.send("/app/chat.send", {}, JSON.stringify(chatMessage));
        document.getElementById('message').value = '';
    }

    function newUser() {
        const sender = document.getElementById('username').value;
        const chatMessage = {
            sender: sender,
            message: '',
            type: 'JOIN'
        };
        stompClient.send("/app/chat.newUser", {}, JSON.stringify(chatMessage));
    }

    function showMessage(msg) {
        const messagesDiv = document.getElementById('messages');
        const p = document.createElement('p');

        if(msg.type === 'JOIN') {
            p.textContent = `[JOIN] ${msg.sender} a rejoint le chat`;
            p.style.color = 'green';
        } else if(msg.type === 'CHAT') {
            p.textContent = `${msg.sender}${msg.receiver ? ' -> ' + msg.receiver : ''}: ${msg.message}`;
        } else {
            p.textContent = JSON.stringify(msg);
        }

        messagesDiv.appendChild(p);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
</script>
</body>
</html>
